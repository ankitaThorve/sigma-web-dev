<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Shadows & Outlines</title>
    <style>
      .box {
        border: 2px solid peru;
        padding: 34px;
        box-shadow: 5px 15px 5px #3dbcdc;
      }
      .text {
        text-shadow: 2px 2px 4px #d6ef1a;
      border: 2px solid blue;
      border-radius: 3px;
      outline: 2px solid rgb(32, 236, 9);
      outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div class="box">I am a box</div><br>
    <div class="text">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Eos
        reprehenderit quos ab molestias, sunt laboriosam culpa quam modi
        reiciendis illo!
      </p>
    </div>
  </body>
</html>
