<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 12px;
      }
      .box {
        box-sizing: border-box;
        border: 2px solid black;
        /* width: 233px; */
        /* width: 2048px; */
        width: 80vw;
        height: 10vh;
        margin: auto;
        background-color: aquamarine;
      }
      .container {
        box-sizing: border-box;
        border: 2px solid black;
        /* width: 233px; */
        /* width: 2048px; */
        /* font-size: 18px; */
        width: 80vw;
        height: 80vh;
        margin: 23px auto;
        background-color: aquamarine;
      }
      
      .container p {
        /* font-size: 2em; */
        font-size: 2rem;
      }
      .myCont {
        box-sizing: border-box;
        border: 2px solid black;
        /* width: 100vmin; */
        /* background-color: red; */
        color: yellow;
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div class="box">This is a box.</div>
    <div class="container">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Assumenda
        adipisci eaque nihil consequuntur, doloribus saepe. Voluptas facere aut
        commodi voluptates labore illum hic officia dolor mollitia deserunt, in
        suscipit debitis.
      </p>
    </div>
    <div class="myCont">
      <p>This is another container.</p>
    </div>
  </body>
</html>
