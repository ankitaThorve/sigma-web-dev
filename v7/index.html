<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms - Let's learn it</title>
  </head>
  <body>
    <h1>Form to apply for Sigma Web Dev Course - TA</h1>
    <form action="" method="post">
      <div>
        <label for="username">Enter your name</label>
        <input type="text" name="" id="username" autofocus/>
      </div>
      <div>
        <input type="radio" name="gender" id="male" value="male" />
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female" />
        <label for="female">Female</label>
      </div>
      <div>
        <input type="checkbox" name="subscribe" id="subscribe" value="yes" />
        <label for="subscribe">Subscribe to newsletter</label>
      </div>
      <div>
        <label for="comment">Your feedback please</label>
        <br>
        <textarea name="comments" id="comment" rows="10" cols="30" placeholder="Enter your comment here"></textarea>
      </div>
      <div>
        <select name="fruits" id="fruit">
          <option value="apple">Apple</option>
          <option value="banana">Banana</option>
          <option value="jackfruit">Jackfruit</option>
          <option value="orange">Orange</option>
        </select>
      </div>
    </form>
  </body>
</html>
