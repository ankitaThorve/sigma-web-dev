<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Card Design</title>
    <link rel="stylesheet" href="cat.css" />
  </head>
  <body>
    <div class="parent-container">
      <div class="card">
        <img
          class="card-img"
          src="https://images.pexels.com/photos/30421127/pexels-photo-30421127.jpeg"
          alt="A Black Cat with golden eyes"
        />
        <span>Cats</span>
        <span>Meow</span>
        <div class="text-content">
          <h2>It's Purrty Time</h2>
          <p>
            Throwing a cat party is a fun way to celebrate your feline friend by
            pampering them with interactive play, yummy treats, and a
            stress-free environment.
          </p>
        </div>
        <button>Read More</button>
      </div>
    </div>
  </body>
</html>
