<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flexbox</title>
    <style>
      .container {
        border: 2px solid red;
        display: flex;
        height: 80vh;
        /* justify-content: space-around; */
        align-items: center;
        /* flex-direction: column; */
        flex-wrap: wrap;
        align-content: center;
        /* There is no justify-items in flexbox */
        row-gap: 40px;
        column-gap: 50px;
      }
      .item {
        height: 55px;
        width: 55px;
        border: 2px solid black;
        margin: 4px;
        background-color: chartreuse;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </main>
  </body>
</html>
