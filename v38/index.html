<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flexbox</title>
    <style>
      .container {
        border: 2px solid red;
        display: flex;
        height: 80vh;
        /* justify-content: space-around; */
        align-items: center;
        /* flex-direction: column; */
        /* flex-wrap: wrap; */
        align-content: center;
        /* There is no justify-items in flexbox */
        row-gap: 40px;
        column-gap: 50px;
        flex-flow: row wrap;
      }
      .item {
        flex-grow: 2;
        flex-shrink: 2;
        height: 55px;
        width: 55px;
        border: 2px solid black;
        margin: 4px;
        background-color: chartreuse;
      }

      .order1{
        order: 1
      }
      .order2{
      order: 2
      }
      .order3{
        order: 3
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="item order1" >1</div>
        <div class="item order2">2</div>
        <div class="item order3">3</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </main>
  </body>
</html>
