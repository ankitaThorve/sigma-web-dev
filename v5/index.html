<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img width="230" src="./image.png" alt="nature" />
    <br />
    <table>
      <caption>
        Employee Details
      </caption>
      <thead>
        <!-- header content -->
        header
      </thead>
      <tbody>
        <tr>
          <th>Name</th>
          <th>Position</th>
          <th>Fav Lang</th>
        </tr>
        <tr>
          <td>Harry</td>
          <td>Programmer</td>
          <td>JavaScript</td>
        </tr>
        <tr>
          <td colspan="2">Sam</td>
          <td>Java</td>
        </tr>
        <tr>
          <td rowspan="2">Peter</td>
          <td rowspan="2">Coder</td>
          <td>C++</td>
        </tr>
        <tr>
          <td>php</td>
        </tr>
      </tbody>
      <tfoot>
        <!-- footer content -->
        footer
        <tr>
          <td colspan="2">Sam</td>
          <td>Java</td>
        </tr>
      </tfoot>
    </table>

    <ul type="square">
      <li>Harry</li>
      <li>Rohan</li>
      <li>Shubham</li>
    </ul>

    <ol type="i">
      <li>Harry</li>
      <li>Rohan</li>
      <li>Shubham</li>
    </ol>
  </body>
</html>
