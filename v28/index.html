<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Position</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .parent {
        border: 3px solid rgb(243, 8, 8);
        padding: 34px;
        margin: 43px;
        /* position: absolute; */
        /* position: relative; */
        /* Exception: transform, filter, or perspective properties can also make an element appear as positioned */
        /* transform: translate(0); */
        /* filter: invert(0); */
        /* perspective: 0em; */
      }
      .box {
        border: 2px solid black;
        height: 433px;
        width: 80vw;
        padding: 3px;
        margin: 3px;
        font-size: 50px;
      }
      .box1 {
        background-color: aqua;
        position: sticky;
        padding: 0;
        margin: 0;
        top: 0;
        width: 100%;
        /* position: absolute;
        top: 23px;
        left: 45px; */
      }
      .box2 {
        background-color: aquamarine;
        /* position: relative;
        /* top: 34px; */
        /* left: 15px; */
      }
      .box3 {
        background-color: palevioletred;
        position: fixed;
        bottom: 0;
        left: 8vw;
        height: 111px;
      }
      .box4 {
        background-color: plum;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box box1">Box 1- Position: Static</div>
      <div class="box box2">Box 2- Position: Relative</div>
      <div class="box box3">Box 3-</div>
      <div class="box box4">Box 4-</div>
    </div>
  </body>
</html>
